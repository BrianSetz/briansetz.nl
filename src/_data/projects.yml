- title: NextGenSmart DC
  description: >-
    The NextGenSmart DC project's premise is that the application of
    state-of-the-art ICT tools and techniques can improve the environmental footprint of
    energy-intensive facilities and deliver Smarter and Greener Data-Centers, through
    'self-help'.
  url: https://www.iaas.uni-stuttgart.de/abteilung-service-computing/projekte/nextgensmartdc/

- title: SENSible hEating Operation Solutions
  description: >-
    Computer-based control of the heating system of buildings that have still manual
    control of radiators. The solution optimizes the heating of rooms based on
    fusion of information regarding users presence, external weather conditions, weather
    forecast, and university/user calendars. The goal is to control the room
    heating automatically and heat only when users are present, thus, optimizing the
    temperature given the weather exposition and the actual number of occupants present
    in the room.

- title: Sustainable Buildings
  description: >-
    Our first Proof-of-Concept project is "The Bernoulliborg – The building of
    Sustainability". In this project, we apply our first smart energy solutions to an
    existing building to make it even more energy-efficient and that way to generate
    significant additional savings!
  url: https://www.sustainablebuildings.nl/

- title: Green Mind Award
  description: >-
    An extremely comprehensive project with advantages such as water conservation,
    responsible waste recycling, smart reduction in electricity consumption and
    intelligent lighting.
